<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto | RegulaTec</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f4f6f8; color: #1f2937; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { width: 100%; max-width: 460px; background: #ffffff; border-radius: 16px; padding: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
    .logo { max-width: 180px; margin-bottom: 16px; }
    h1 { margin: 0 0 8px; font-size: 26px; }
    p { margin: 0 0 24px; color: #6b7280; font-size: 14px; }
    form { display: grid; gap: 14px; text-align: left; }
    label { font-size: 14px; font-weight: 600; margin-bottom: 6px; display: block; }
    input { width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; }
    .opciones { display: grid; gap: 8px; }
    .opciones label { font-weight: normal; display: flex; align-items: center; gap: 8px; }
    .botones { display: grid; gap: 10px; margin-top: 10px; }
    button { border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .whatsapp { background: #25d366; color: #fff; }
    .correo { background: #2563eb; color: #fff; }
    .nota { margin-top: 14px; font-size: 12px; color: #6b7280; text-align: center; }
  </style>
</head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-W2YGKPKBS7"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-W2YGKPKBS7');
</script>
<body>
  <div class="card">

    <img src="https://witpublicimages.blob.core.windows.net/public/FOTOSREGULATEC/regulatecLogo.png" alt="RegulaTec" class="logo">

    <h1>Contáctanos</h1>
    <p>Déjanos tus datos y elige cómo prefieres que te contactemos.</p>

    <form id="leadForm">
      <div>
        <label>Nombre</label>
        <input type="text" id="nombre" required />
      </div>

      <div>
        <label>Apellido</label>
        <input type="text" id="apellido" required />
      </div>

      <div>
        <label>Teléfono</label>
        <input type="tel" id="telefono" required />
      </div>

      <div>
        <label>Correo</label>
        <input type="email" id="correo" required />
      </div>

      <div>
        <label>Empresa</label>
        <input type="text" id="empresa" required />
      </div>

      <div>
        <label>Servicio requerido</label>
        <select id="servicio" required style="width:100%; padding:12px; border-radius:10px; border:1px solid #d1d5db; font-size:15px;">
          <option value="" disabled selected>Selecciona un servicio</option>
          <option value="ISO 9001">ISO 9001 (Calidad)</option>
          <option value="ISO 14001">ISO 14001 (Medio Ambiente)</option>
          <option value="ISO 45001">ISO 45001 (Seguridad y Salud)</option>
          <option value="ISO 27001">ISO 27001 (Seguridad de la Información)</option>
          <option value="ISO 22000">ISO 22000 (Inocuidad Alimentaria)</option>
          <option value="ISO 50001">ISO 50001 (Gestión Energética)</option>
          <option value="Diagnóstico">Diagnóstico inicial</option>
          <option value="Auditoría">Auditoría interna</option>
          <option value="Mantenimiento">Mantenimiento y mejora</option>
          <option value="Otro">Otro</option>
        </select>
      </div>

      <div class="botones">
        <button type="button" class="whatsapp" onclick="enviarWhatsApp()">Contactar por WhatsApp</button>
        <button type="button" class="correo" onclick="enviarCorreo()">Contactar por Correo</button>
      </div>
    </form>

    <div class="nota">Se abrirá WhatsApp o tu cliente de correo con la información cargada.</div>
  </div>

  <script>
    function obtenerDatos() {
      return {
        nombre: document.getElementById('nombre').value,
        apellido: document.getElementById('apellido').value,
        telefono: document.getElementById('telefono').value,
        correo: document.getElementById('correo').value,
        empresa: document.getElementById('empresa').value,
        servicio: document.getElementById('servicio').value
      };
    }

    function construirMensaje(data) {
      return `Nombre: ${data.nombre}\nApellido: ${data.apellido}\nTeléfono: ${data.telefono}\nCorreo: ${data.correo}\nEmpresa: ${data.empresa}\nServicio: ${data.servicio}`;
    }

    function enviarWhatsApp() {
      const data = obtenerDatos();
      const mensaje = encodeURIComponent(construirMensaje(data));
      const url = `https://wa.me/56997290659?text=${mensaje}`;
      window.open(url, '_blank');
    }

    function enviarCorreo() {
      const data = obtenerDatos();
      const asunto = encodeURIComponent('Solicitud de contacto - RegulaTec');
      const cuerpo = encodeURIComponent(construirMensaje(data));
      const mailto = `mailto:ventas@regulatec.cl?subject=${asunto}&body=${cuerpo}`;
      window.location.href = mailto;
    }
  </script>
</body>
</html>
